{% extends "base.html" %}{% block title %}Search Records | SmartVerify{% endblock %}{% block content %}
<div class="row justify-content-center"><div class="col-lg-10"><div class="mb-4"><p class="eyebrow mb-2">Historical database</p><h1 class="page-heading">Search citizen records</h1><p class="page-subtitle">Use one or more fields to find a matching historical record.</p></div><div class="panel p-4 p-md-5"><form action="/search" method="POST"><div class="row g-3"><div class="col-md-6"><label class="form-label">First name</label><input class="form-control" name="first_name" placeholder="e.g. Ananya"></div><div class="col-md-6"><label class="form-label">Last name</label><input class="form-control" name="last_name" placeholder="e.g. Sharma"></div><div class="col-md-6"><label class="form-label">Father's name</label><input class="form-control" name="father_name"></div><div class="col-md-6"><label class="form-label">Mother's name</label><input class="form-control" name="mother_name"></div><div class="col-md-4"><label class="form-label">Date of birth</label><input class="form-control" type="date" name="dob"></div><div class="col-md-4"><label class="form-label">Phone number</label><input class="form-control" type="tel" name="phone"></div><div class="col-md-4"><label class="form-label">District</label><input class="form-control" name="district"></div><div class="col-md-6"><label class="form-label">Constituency</label><input class="form-control" name="constituency"></div></div><div class="d-flex justify-content-between align-items-center mt-4 gap-3 flex-wrap"><a href="/" class="btn btn-link text-secondary text-decoration-none px-0"><i class="bi bi-arrow-left me-1"></i>Dashboard</a><button class="btn btn-primary px-4" type="submit"><i class="bi bi-search me-1"></i>Search records</button></div></form></div></div></div>
{% endblock %}
