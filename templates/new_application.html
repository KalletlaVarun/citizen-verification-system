{% extends "base.html" %}{% block title %}New Application | SmartVerify{% endblock %}{% block content %}
<div class="row justify-content-center"><div class="col-lg-11"><div class="mb-4"><p class="eyebrow mb-2">Verification request</p><h1 class="page-heading">New application</h1><p class="page-subtitle">Enter the applicant's details to start an automatic verification.</p></div><form action="/submit_application" method="POST" class="panel p-4 p-md-5"><p class="fw-bold mb-3">Personal details</p><div class="row g-3"><div class="col-md-4"><label class="form-label">First name <span class="text-danger">*</span></label><input class="form-control" name="first_name" required></div><div class="col-md-4"><label class="form-label">Middle name</label><input class="form-control" name="middle_name"></div><div class="col-md-4"><label class="form-label">Last name <span class="text-danger">*</span></label><input class="form-control" name="last_name" required></div><div class="col-md-6"><label class="form-label">Father's name</label><input class="form-control" name="father_name"></div><div class="col-md-6"><label class="form-label">Mother's name</label><input class="form-control" name="mother_name"></div><div class="col-md-4"><label class="form-label">Gender</label><select class="form-select" name="gender"><option>Male</option><option>Female</option><option>Other</option></select></div><div class="col-md-4"><label class="form-label">Date of birth</label><input class="form-control" type="date" name="dob"></div><div class="col-md-4"><label class="form-label">Phone number</label><input class="form-control" type="tel" name="phone"></div><div class="col-md-6"><label class="form-label">Email address</label><input class="form-control" type="email" name="email"></div><div class="col-md-6"><label class="form-label">Pincode</label><input class="form-control" name="pincode"></div></div><hr class="my-4"><p class="fw-bold mb-3">Address details</p><div class="row g-3"><div class="col-md-6"><label class="form-label">City</label><input class="form-control" name="city"></div><div class="col-md-6"><label class="form-label">District</label><input class="form-control" name="district"></div><div class="col-md-6"><label class="form-label">State</label><input class="form-control" name="state"></div><div class="col-md-6"><label class="form-label">Constituency</label><input class="form-control" name="constituency"></div><div class="col-12"><label class="form-label">Address</label><textarea class="form-control" rows="3" name="address"></textarea></div></div><div class="d-flex justify-content-between align-items-center mt-4 gap-3 flex-wrap"><a href="/" class="btn btn-link text-secondary text-decoration-none px-0"><i class="bi bi-arrow-left me-1"></i>Cancel</a><button class="btn btn-primary px-4"><i class="bi bi-shield-check me-1"></i>Submit application</button></div></form></div></div>
{% endblock %}
