<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Smart Verification System{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --navy:#14213d; --blue:#2563eb; --ink:#172033; --muted:#667085; --surface:#fff; --canvas:#f5f7fb; --line:#e5eaf2; }
    * { box-sizing:border-box; }
    body { min-height:100vh; background:var(--canvas); color:var(--ink); font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif; }
    .app-nav { background:rgba(20,33,61,.97); box-shadow:0 2px 15px rgba(15,23,42,.12); }
    .brand-mark { width:34px; height:34px; display:inline-grid; place-items:center; color:var(--navy); background:#fff; border-radius:10px; }
    .navbar-brand { font-weight:700; letter-spacing:-.02em; }.nav-link { color:rgba(255,255,255,.76)!important; font-size:.91rem; }.nav-link:hover { color:#fff!important; }
    .page-wrap { max-width:1180px; padding-top:2.5rem; padding-bottom:3rem; }.page-heading { font-weight:750; letter-spacing:-.035em; margin:0; }.eyebrow { color:var(--blue); font-size:.75rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; }.page-subtitle { color:var(--muted); margin:.35rem 0 0; }
    .panel { background:var(--surface); border:1px solid var(--line); border-radius:18px; box-shadow:0 8px 24px rgba(15,23,42,.045); }.form-label { color:#344054; font-size:.875rem; font-weight:600; margin-bottom:.42rem; }.form-control,.form-select { border-color:#d8dee9; border-radius:10px; min-height:45px; } textarea.form-control { min-height:auto; }.form-control:focus,.form-select:focus { border-color:#86a9f5; box-shadow:0 0 0 .22rem rgba(37,99,235,.12); }
    .btn { border-radius:10px; font-weight:600; padding:.62rem 1rem; }.btn-primary { background:var(--blue); border-color:var(--blue); }.btn-primary:hover { background:#1d4ed8; border-color:#1d4ed8; }.table { margin-bottom:0; }.table thead th { background:#f8fafc; border-bottom:1px solid var(--line); color:#475467; font-size:.74rem; letter-spacing:.055em; padding:.9rem 1rem; text-transform:uppercase; white-space:nowrap; }.table td { border-color:#edf0f5; color:#344054; padding:.9rem 1rem; vertical-align:middle; }.badge { border-radius:999px; font-weight:650; padding:.45em .7em; }.empty-state { color:var(--muted); padding:3rem 1.5rem; text-align:center; }.empty-state i { color:#98a2b3; font-size:2.1rem; }.footer-note { color:#98a2b3; font-size:.8rem; text-align:center; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark app-nav"><div class="container"><a class="navbar-brand d-flex align-items-center gap-2" href="/"><span class="brand-mark"><i class="bi bi-shield-check"></i></span> SmartVerify</a><button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"><span class="navbar-toggler-icon"></span></button><div class="collapse navbar-collapse" id="mainNav"><ul class="navbar-nav ms-auto gap-lg-2"><li class="nav-item"><a class="nav-link" href="/search_records">Search</a></li><li class="nav-item"><a class="nav-link" href="/new_application">New application</a></li><li class="nav-item"><a class="nav-link" href="/verification_results">Verification history</a></li></ul></div></div></nav>
  <main class="container page-wrap">{% block content %}{% endblock %}</main><p class="footer-note mb-4">Smart Verification System &middot; Secure citizen verification</p><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
